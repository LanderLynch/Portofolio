<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Lariso branded invoice collateral placeholder</title>
  <desc id="desc">Branded invoice placeholder showing Lariso stationery collateral.</desc>
  <rect width="1600" height="1000" fill="#fffaf5"/>
  <rect x="250" y="110" width="720" height="760" rx="26" fill="#fff" stroke="#dfc9b8" stroke-width="6"/>
  <rect x="970" y="220" width="360" height="520" rx="28" fill="#fff4e7" stroke="#e1b991" stroke-width="6"/>
  <rect x="250" y="110" width="720" height="120" rx="26" fill="#d96c2f"/>
  <text x="320" y="188" font-family="Georgia, serif" font-size="72" font-style="italic" font-weight="700" fill="#fff8f1">Lariso</text>
  <text x="1050" y="310" font-family="Arial, sans-serif" font-size="28" letter-spacing="6" fill="#9b5a2b">BRANDED COLLATERAL</text>
  <text x="320" y="300" font-family="Arial, sans-serif" font-size="36" fill="#5c4533">Invoice #00126</text>
  <path d="M320 360h580M320 420h580M320 480h580M320 540h580M320 600h580" stroke="#dbc4b0" stroke-width="8" stroke-linecap="round"/>
  <text x="1050" y="410" font-family="Arial, sans-serif" font-size="28" fill="#5c4533">Consistent typography, color, and logo treatment</text>
  <text x="1050" y="458" font-family="Arial, sans-serif" font-size="28" fill="#5c4533">extend the brand beyond packaging into documents</text>
  <text x="1050" y="506" font-family="Arial, sans-serif" font-size="28" fill="#5c4533">that clients and partners actually interact with.</text>
